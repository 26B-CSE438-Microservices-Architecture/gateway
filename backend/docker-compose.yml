version: '3.8'

services:
  gateway-service:
    build:
      context: ./CleanArchitecture
      dockerfile: ./CleanArchitecture.WebApi/Dockerfile
    container_name: gateway-service
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=gateway-postgres;Port=5432;Database=gateway_auth;Username=postgres;Password=123456
    depends_on:
      gateway-postgres:
        condition: service_healthy
    networks:
      - backend-network

  gateway-postgres:
    image: postgres:17
    container_name: gateway-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: gateway_auth
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
